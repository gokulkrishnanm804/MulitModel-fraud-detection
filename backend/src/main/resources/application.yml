spring:
  application:
    name: fraud-detection-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/fraud_detection}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

security:
  jwt:
    secret: ${JWT_SECRET:change_this_to_a_long_random_secret}
    expiry-ms: ${JWT_EXPIRY_MS:3600000}

fraud:
  ml:
    base-url: ${ML_BASE_URL:http://localhost:8001/api/v1}
    connect-timeout-ms: ${ML_CONNECT_TIMEOUT_MS:2000}
    read-timeout-ms: ${ML_READ_TIMEOUT_MS:4000}

management:
  endpoints:
    web:
      exposure:
        include: health,info
